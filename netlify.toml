[build]
  command = "npm run build"
  publish = "dist"

# Branch deploys — staging environment
[context.branch-deploy]
  command = "npm run build"
  publish = "dist"

[context.deploy-preview]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Scheduled function for SMS briefings
[functions."sms-briefing"]
  schedule = "0 1,13,14,15 * * *"
